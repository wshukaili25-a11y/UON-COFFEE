<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>البحث الشامل | UON Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css?v=12.1">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#060b1b">
</head>
<body>
<header class="site-header">
 <div class="container nav">
  <a class="brand" href="index.html"><span class="brand-mark">U1</span>UON <span>Hub</span></a>
  <a class="btn" href="index.html">الرئيسية</a>
 </div>
</header>
<main>
 <section class="page-hero"><div class="container">
  <span class="badge">بحث شامل</span>
  <h1>ابحث في المنصة كلها</h1>
  <p>الملخصات، المجموعات، المشاريع، البرامج والأدوات.</p>
 </div></section>
 <section class="section"><div class="container">
  <div class="toolbar">
   <input id="globalSearch" placeholder="اكتب كلمة البحث..." autocomplete="off">
   <button class="btn primary" id="searchBtn">بحث</button>
  </div>
  <div id="searchMeta" class="muted"></div>
  <div id="searchResults" class="list" style="margin-top:18px"></div>
 </div></section>
</main>
<div id="toast" class="toast"></div>
<script type="module" src="js/search.js?v=12.1"></script>
<script type="module">import {setupPWA} from "./js/pwa.js?v=12.1";setupPWA();</script>
<button class="floating-notification" id="notificationBtn" aria-label="الإشعارات">🔔</button><aside class="notification-drawer" id="notificationDrawer"><div class="section-head"><h3>الإشعارات</h3><button class="icon-btn" id="closeNotifications">✕</button></div><div id="notificationItems" class="notification-list"></div></aside><script type="module">import {loadNotificationCenter} from "./js/core.js?v=12.1";const d=document.querySelector("#notificationDrawer");document.querySelector("#notificationBtn")?.addEventListener("click",()=>{d.classList.add("open");loadNotificationCenter()});document.querySelector("#closeNotifications")?.addEventListener("click",()=>d.classList.remove("open"));</script></body>
</html>
