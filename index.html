<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UoN Coffee Pro</title>

<style>
body{
margin:0;
font-family:'Tajawal',sans-serif;
background:linear-gradient(135deg,#1a0a10,#2d0a14);
color:#fff;
animation:fade .8s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

/* HEADER */
h1{text-align:center;margin-top:40px}

/* CARDS */
.container{padding:20px;text-align:center}
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
margin:10px;
border-radius:15px;
cursor:pointer;
transition:.3s;
}
.card:hover{transform:scale(1.05)}

/* GPA */
select,input,button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
}

button{
background:#c94060;
color:#fff;
cursor:pointer;
}

/* TABLE */
.schedule{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.cell{
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
position:relative;
}

.del{
position:absolute;
top:5px;
left:5px;
cursor:pointer;
color:red;
}

/* BOT */
#chatBtn{
position:fixed;
bottom:20px;
left:20px;
background:#c94060;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

#chatBox{
position:fixed;
bottom:90px;
left:20px;
width:320px;
background:#2d0a14;
border-radius:15px;
display:none;
flex-direction:column;
}

.chat-header{background:#c94060;padding:10px;text-align:center}
.chat-body{height:240px;overflow:auto;padding:10px}
.user{text-align:right;margin:5px}
.bot{color:#ff8aa0;margin:5px}

.chat-input{display:flex}
.chat-input input{flex:1;padding:10px;border:none}
.chat-input button{background:#c94060;border:none;color:#fff}

/* TOP BUTTON */
#topBtn{
position:fixed;
bottom:20px;
right:20px;
background:#c94060;
padding:10px;
border-radius:50%;
cursor:pointer;
display:none;
}

</style>
</head>
<body>

<h1>☕ UoN Coffee Pro</h1>

<div class="container">

<div class="card" onclick="show('gpa')">📊 حاسبة المعدل</div>
<div class="card" onclick="show('table')">📅 الجدول</div>

<!-- GPA -->
<div id="gpa" style="display:none">
<h3>حاسبة المعدل</h3>
<div id="rows"></div>
<button onclick="addRow()">+ مادة</button>
<button onclick="calc()">احسب</button>
<h2 id="result"></h2>
<p id="rate"></p>
</div>

<!-- TABLE -->
<div id="table" style="display:none">
<h3>جدولك</h3>
<input id="sub" placeholder="المادة">
<input id="time" placeholder="الوقت">
<button onclick="addClass()">إضافة</button>
<div class="schedule" id="schedule"></div>
</div>

</div>

<!-- BOT -->
<div id="chatBtn" onclick="toggleChat()">💬</div>

<div id="chatBox">
<div class="chat-header">🤖 UoN Bot</div>
<div class="chat-body" id="chatBody"></div>
<div class="chat-input">
<input id="msg" placeholder="اسألني...">
<button onclick="sendMsg()">إرسال</button>
</div>
</div>

<div id="topBtn" onclick="scrollTop()">↑</div>

<script>

/* NAV */
function show(id){
document.getElementById('gpa').style.display='none';
document.getElementById('table').style.display='none';
document.getElementById(id).style.display='block';
}

/* GPA */
function addRow(){
let div=document.createElement("div");
div.innerHTML=`
<select><option value="3">3 ساعات</option></select>
<select>
<option value="4">A</option>
<option value="3.7">A-</option>
<option value="3">B</option>
<option value="2">C</option>
</select>`;
document.getElementById("rows").appendChild(div);
}

function calc(){
let rows=document.querySelectorAll("#rows div");
let total=0,hours=0;

rows.forEach(r=>{
let s=r.querySelectorAll("select");
total+=s[0].value*s[1].value;
hours+=parseFloat(s[0].value);
});

let g=(total/hours).toFixed(2);
document.getElementById("result").textContent=g;

let msg="";
if(g>=3.7) msg="🔥 أسطوري";
else if(g>=3) msg="💪 ممتاز";
else if(g>=2) msg="🙂 جيد";
else msg="🚨 شد حيلك";

document.getElementById("rate").textContent=msg;

localStorage.setItem("gpa",g);
}

/* LOAD */
window.onload=function(){
let g=localStorage.getItem("gpa");
if(g) document.getElementById("result").textContent=g;

let data=JSON.parse(localStorage.getItem("schedule")||"[]");
data.forEach(addToUI);
}

/* TABLE */
function addClass(){
let sub=document.getElementById("sub").value;
let time=document.getElementById("time").value;

let obj={sub,time};
let data=JSON.parse(localStorage.getItem("schedule")||"[]");

data.push(obj);
localStorage.setItem("schedule",JSON.stringify(data));

addToUI(obj);
}

function addToUI(c){
let div=document.createElement("div");
div.className="cell";
div.innerHTML=`<span class="del" onclick="del(this)">x</span>${c.sub}<br>${c.time}`;
document.getElementById("schedule").appendChild(div);
}

function del(el){
el.parentElement.remove();
}

/* BOT */
function toggleChat(){
let box=document.getElementById('chatBox');
box.style.display=box.style.display==='flex'?'none':'flex';
}

function sendMsg(){
let msg=document.getElementById("msg").value;
let body=document.getElementById("chatBody");

body.innerHTML+=`<div class="user">${msg}</div>`;

let reply="🤖 حاول بصيغة ثانية";

if(msg.includes("معدل")) reply="📊 احسبه من فوق";
else if(msg.includes("جدول")) reply="📅 سو جدولك بسهولة";
else if(msg.includes("مرحبا")) reply="هلا وغلا 😎";
else if(msg.includes("تسجيل")) reply="📋 تواصل مع القبول والتسجيل";
else if(msg.includes("وقت")) reply="⏰ يعتمد على جدولك الدراسي";

body.innerHTML+=`<div class="bot">${reply}</div>`;
}

/* SCROLL TOP */
window.onscroll=function(){
document.getElementById("topBtn").style.display=
window.scrollY>200?"block":"none";
}

function scrollTop(){
window.scrollTo({top:0,behavior:"smooth"});
}

</script>

</body>
</html>
