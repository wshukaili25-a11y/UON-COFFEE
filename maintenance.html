<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#071022">
<title>الموقع تحت الصيانة | UON Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/base.css">
<style>
.maintenance-shell{min-height:100vh;display:grid;place-items:center;padding:1.2rem;background:
radial-gradient(circle at 50% 20%,rgba(24,199,244,.13),transparent 35%),var(--bg)}
.maintenance-card{width:min(620px,100%);padding:2rem;text-align:center}
.maintenance-icon{width:90px;height:90px;border-radius:25px;display:grid;place-items:center;margin:0 auto 1rem;background:rgba(24,199,244,.1);color:var(--primary);font-size:2.4rem}
.maintenance-card h1{font-size:clamp(2rem,6vw,3.4rem)}
.maintenance-card p{color:var(--muted);line-height:1.9;margin:.9rem auto;max-width:480px}
.pulse{display:inline-flex;gap:.4rem;align-items:center;color:var(--green);font-weight:900}
.pulse::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(37,211,102,.5);animation:pulse 1.4s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 12px rgba(37,211,102,0)}100%{box-shadow:0 0 0 0 rgba(37,211,102,0)}}
</style>
</head>
<body>
<main class="maintenance-shell">
<section class="card maintenance-card">
<div class="maintenance-icon"><i class="fas fa-screwdriver-wrench"></i></div>
<h1>الموقع تحت الصيانة</h1>
<p id="maintenanceMessage">نعمل حاليًا على تحسين UON Hub. بنرجع لكم قريبًا بشكل أفضل 🌚</p>
<div class="pulse">فريق UON Hub يعمل الآن</div>
</section>
</main>
<script type="module" src="js/maintenance-page.js"></script>
</body></html>
