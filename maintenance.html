<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تحت الصيانة</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/app.css?v=11"><link rel="manifest" href="manifest.webmanifest"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#060b1b"></head><body><main class="login-shell"><section class="card login-card" style="text-align:center"><div style="font-size:4rem">🛠️</div><h1>الموقع تحت الصيانة</h1><p id="message" style="color:var(--muted);line-height:1.8">نعمل على تحسين UON Hub، بنرجع قريبًا.</p></section></main><script type="module" src="js/maintenance.js?v=11"></script><script type="module">import {setupPWA} from "./js/pwa.js?v=11";setupPWA();</script>
<script>
(async()=>{try{
 if('serviceWorker' in navigator){
  const regs=await navigator.serviceWorker.getRegistrations();
  for(const r of regs)await r.unregister();
 }
 if('caches' in window){
  for(const k of await caches.keys())await caches.delete(k);
 }
}catch(e){console.warn(e)}})();
</script>
</body></html>
