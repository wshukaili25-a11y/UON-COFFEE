<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>الجدول الدراسي | UON Hub</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/pages.css"><link rel="stylesheet" href="css/features.css"></head><body>
<header class="site-header"><div class="container nav"><a class="brand" href="index.html" data-admin-entry><span class="brand-mark">U1</span>UON <span>Hub</span></a><ul class="nav-links" id="navLinks"><li><a href="index.html">الرئيسية</a></li><li><a href="schedule.html" class="active">الجدول</a></li><li><a href="gpa.html">المعدل</a></li><li><a href="tools.html">الأدوات</a></li></ul><div class="nav-actions"><button class="icon-btn mobile-menu" id="menuBtn"><i class="fas fa-bars"></i></button></div></div></header>
<main><section class="page-hero"><div class="container"><h1>منظّم الجدول الدراسي</h1><p>أضف المحاضرات، اكتشف التعارضات، واعرض جدولك أسبوعيًا على الجوال أو الكمبيوتر.</p></div></section>
<section class="section"><div class="container">
<div class="card feature-card"><div class="form-grid">
<div class="field"><label>رمز المادة</label><input id="scCourse" placeholder="STAT101"></div>
<div class="field"><label>اسم المادة</label><input id="scName" placeholder="Statistics"></div>
<div class="field"><label>اليوم</label><select id="scDay"><option>الأحد</option><option>الاثنين</option><option>الثلاثاء</option><option>الأربعاء</option><option>الخميس</option><option>السبت</option></select></div>
<div class="field"><label>من</label><input id="scStart" type="time" value="08:00"></div>
<div class="field"><label>إلى</label><input id="scEnd" type="time" value="09:30"></div>
<div class="field"><label>القاعة</label><input id="scRoom" placeholder="B12"></div>
<div class="field"><label>الدكتور</label><input id="scInstructor"></div>
<div class="field"><label>اللون</label><input id="scColor" type="color" value="#18c7f4"></div>
</div><button class="primary-btn" id="addScheduleItem" style="margin-top:1rem"><i class="fas fa-plus"></i> إضافة للجدول</button></div>
<div id="scheduleWarning" class="gpa-advice" hidden></div>
<div class="toolbar" style="margin-top:1rem"><button class="outline-btn" id="printSchedule"><i class="fas fa-print"></i> طباعة</button><button class="outline-btn" id="exportSchedule"><i class="fas fa-download"></i> تصدير JSON</button><label class="outline-btn"><i class="fas fa-upload"></i> استيراد<input id="importSchedule" type="file" accept=".json" hidden></label><button class="outline-btn" id="clearSchedule"><i class="fas fa-trash"></i> مسح</button></div>
<div class="card schedule-board"><div class="schedule-week" id="scheduleWeek"></div></div>
<div class="card feature-card" style="margin-top:1rem"><h2>قائمة المحاضرات</h2><div id="scheduleList" class="schedule-list"></div></div>
</div></section></main><footer class="site-footer"><div class="container footer-row"><span>© 2026 UON Hub</span><span>يحفظ الجدول تلقائيًا على جهازك</span></div></footer><script type="module" src="js/maintenance.js"></script><script type="module" src="js/schedule.js"></script></body></html>
