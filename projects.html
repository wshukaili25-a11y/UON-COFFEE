<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>مشاريع الطلاب | UON Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#00d4ff;--green:#22c55e;--dark:#0a0e27;--card:#1a1f3d;--text:#e2e8f0;--muted:#718096;--danger:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:var(--dark);color:var(--text)}
.container{width:min(1200px,92%);margin:auto}
header{padding:1rem 0;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;background:rgba(10,14,39,.92);backdrop-filter:blur(14px);z-index:20}
.nav{display:flex;align-items:center;justify-content:space-between;gap:1rem}
.logo{font-weight:900;font-size:1.2rem}.logo span{color:var(--primary)}
.back{color:var(--text);text-decoration:none;border:1px solid rgba(255,255,255,.1);padding:.55rem .8rem;border-radius:10px}
.hero{padding:4rem 0 2rem;text-align:center}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);margin-bottom:.8rem}
.hero p{color:var(--muted);max-width:680px;margin:auto}
.hero-actions{display:flex;justify-content:center;gap:.8rem;flex-wrap:wrap;margin-top:1.5rem}
.btn{border:0;border-radius:12px;padding:.8rem 1.1rem;font-family:Tajawal,sans-serif;font-weight:900;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--primary),#0099cc);color:#071326}
.btn-secondary{background:transparent;border:1px solid var(--primary);color:var(--primary)}
.featured-wrap{display:none;margin:1.5rem 0 2rem}
.featured-wrap.show{display:block}
.featured-banner{display:grid;grid-template-columns:1.2fr .8fr;gap:1rem;align-items:center;padding:1.2rem;border-radius:20px;background:linear-gradient(135deg,#183b66,#1d4ed8);border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 50px rgba(0,0,0,.2)}
.featured-banner h2{font-size:1.45rem}.featured-banner p{color:rgba(255,255,255,.75);margin:.45rem 0}
.featured-tag{display:inline-flex;padding:.3rem .65rem;border-radius:999px;background:#facc15;color:#1f2937;font-size:.7rem;font-weight:900;margin-bottom:.65rem}
.featured-image{aspect-ratio:16/9;border-radius:15px;background:#0b1732 center/cover no-repeat;border:1px solid rgba(255,255,255,.1)}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem}
.toolbar input{flex:1;min-width:230px;background:var(--card);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:.8rem 1rem;color:white;font-family:Tajawal,sans-serif}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;padding-bottom:4rem}
.card{background:linear-gradient(150deg,rgba(31,38,77,.98),rgba(19,25,52,.98));border:1px solid rgba(255,255,255,.07);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;transition:.25s}
.card:hover{transform:translateY(-5px);border-color:rgba(0,212,255,.22)}
.card-image{aspect-ratio:16/9;background:#111b3d center/cover no-repeat}
.card-body{padding:1rem;display:flex;flex-direction:column;gap:.65rem;flex:1}
.card h3{font-size:1.08rem}.card p{color:var(--muted);font-size:.86rem;line-height:1.7}
.meta{display:flex;gap:.4rem;flex-wrap:wrap}.chip{font-size:.66rem;padding:.22rem .5rem;border-radius:999px;background:rgba(0,212,255,.08);color:var(--primary)}
.links{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:auto}.links a{color:white;text-decoration:none;border:1px solid rgba(255,255,255,.1);padding:.45rem .65rem;border-radius:9px;font-size:.75rem}
.empty{grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);border:1px dashed rgba(255,255,255,.1);border-radius:16px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:none;align-items:center;justify-content:center;padding:1rem;z-index:50}
.modal.show{display:flex}
.modal-card{width:min(760px,100%);max-height:90vh;overflow:auto;background:var(--card);border-radius:20px;padding:1.2rem;border:1px solid rgba(255,255,255,.1)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}.modal-head button{background:none;border:0;color:white;font-size:1.2rem;cursor:pointer}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem}
.form-group{display:flex;flex-direction:column;gap:.35rem}.wide{grid-column:1/-1}
.form-group label{font-size:.76rem;color:var(--muted)}
.form-group input,.form-group textarea,.form-group select{background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.72rem;color:white;font-family:Tajawal,sans-serif}
.notice{font-size:.75rem;color:var(--muted);margin-top:.7rem}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:white;padding:.75rem 1rem;border-radius:11px;opacity:0;transition:.25s;z-index:60}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.error{background:var(--danger)}
@media(max-width:700px){.featured-banner{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.wide{grid-column:auto}.hero{padding-top:2.5rem}.grid{grid-template-columns:1fr}.nav{align-items:flex-start}}
</style>
</head>
<body>
<header><div class="container nav"><div class="logo">UON <span>Hub</span></div><a class="back" href="index.html">العودة للرئيسية</a></div></header>
<main class="container">
<section class="hero">
<h1>مشاريع الطلاب 💻</h1>
<p>اعرض مشروعك، اكتشف أفكار زملائك، وابحث عن فريق أو فرصة تعاون.</p>
<div class="hero-actions"><button class="btn btn-primary" onclick="openSubmit()">أضف مشروعك</button><button class="btn btn-secondary" onclick="document.getElementById('projectsGrid').scrollIntoView({behavior:'smooth'})">تصفح المشاريع</button></div>
</section>
<section id="featuredWrap" class="featured-wrap"><div id="featuredBanner" class="featured-banner"></div></section>
<div class="toolbar"><input id="projectSearch" placeholder="ابحث باسم المشروع أو التخصص..." oninput="filterProjects(this.value)"></div>
<section id="projectsGrid" class="grid"><div class="empty">جاري تحميل المشاريع...</div></section>
</main>

<div id="submitModal" class="modal">
<div class="modal-card">
<div class="modal-head"><h2>إضافة مشروع</h2><button onclick="closeSubmit()"><i class="fas fa-times"></i></button></div>
<div class="form-grid">
<div class="form-group"><label>اسم المشروع *</label><input id="pTitle" maxlength="100"></div>
<div class="form-group"><label>اسم صاحب المشروع *</label><input id="pOwner" maxlength="80"></div>
<div class="form-group"><label>التخصص</label><input id="pMajor" maxlength="80"></div>
<div class="form-group"><label>سنة الدراسة</label><input id="pYear" maxlength="30"></div>
<div class="form-group wide"><label>وصف المشروع *</label><textarea id="pDescription" rows="4" maxlength="600"></textarea></div>
<div class="form-group"><label>رابط GitHub</label><input id="pGithub" placeholder="https://github.com/..."></div>
<div class="form-group"><label>رابط المشروع</label><input id="pDemo" placeholder="https://..."></div>
<div class="form-group"><label>رابط صورة المشروع</label><input id="pImage" placeholder="https://..."></div>
<div class="form-group"><label>وسيلة التواصل *</label><input id="pContact" placeholder="واتساب أو بريد إلكتروني"></div>
</div>
<p class="notice">سيظهر المشروع بعد مراجعته واعتماده من المشرف.</p>
<button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="submitProject()">إرسال للمراجعة</button>
</div></div>
<div id="toast" class="toast"></div>

<script>
const SB_URL='https://irkhvydgxpseflggbeqq.supabase.co'
const SB_KEY='sb_publishable_gZ9tyM1udrkuQIXHqDtToQ_FyFmePgH'
const headers={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'}
let projects=[]

function showToast(msg,error=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(error?' error':'');setTimeout(()=>t.className='toast',2600)}
function openSubmit(){document.getElementById('submitModal').classList.add('show')}
function closeSubmit(){document.getElementById('submitModal').classList.remove('show')}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}

async function sb(path,opts={}){const r=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:{...headers,...(opts.headers||{})}});const text=await r.text();const data=text?JSON.parse(text):null;if(!r.ok)throw new Error(data?.message||'Request failed');return data}

function render(list){
 const grid=document.getElementById('projectsGrid')
 if(!list.length){grid.innerHTML='<div class="empty">لا توجد مشاريع معتمدة حاليًا.</div>';return}
 grid.innerHTML=list.map(p=>`
 <article class="card">
   <div class="card-image" style="background-image:url('${esc(p.image_url||'')}')"></div>
   <div class="card-body">
    <h3>${esc(p.title)}</h3>
    <p>${esc(p.description)}</p>
    <div class="meta">
      ${p.owner_name?`<span class="chip">${esc(p.owner_name)}</span>`:''}
      ${p.major?`<span class="chip">${esc(p.major)}</span>`:''}
      ${p.study_year?`<span class="chip">${esc(p.study_year)}</span>`:''}
    </div>
    <div class="links">
      ${p.github_url?`<a target="_blank" href="${esc(p.github_url)}"><i class="fab fa-github"></i> GitHub</a>`:''}
      ${p.demo_url?`<a target="_blank" href="${esc(p.demo_url)}"><i class="fas fa-external-link-alt"></i> Demo</a>`:''}
    </div>
   </div>
 </article>`).join('')
}

function filterProjects(q){q=String(q||'').toLowerCase();render(!q?projects:projects.filter(p=>`${p.title||''} ${p.description||''} ${p.major||''}`.toLowerCase().includes(q)))}

async function loadProjects(){
 try{
  projects=await sb('student_projects?select=*&status=eq.approved&order=featured.desc,created_at.desc')
  render(projects)
  const featured=projects.find(p=>p.featured)
  if(featured){
   const wrap=document.getElementById('featuredWrap');wrap.classList.add('show')
   document.getElementById('featuredBanner').innerHTML=`
    <div><span class="featured-tag">مشروع مميز ⭐</span><h2>${esc(featured.title)}</h2><p>${esc(featured.description)}</p>
    <div class="links">${featured.demo_url?`<a target="_blank" href="${esc(featured.demo_url)}">عرض المشروع</a>`:''}${featured.github_url?`<a target="_blank" href="${esc(featured.github_url)}">GitHub</a>`:''}</div></div>
    <div class="featured-image" style="background-image:url('${esc(featured.image_url||'')}')"></div>`
  }
 }catch(e){document.getElementById('projectsGrid').innerHTML='<div class="empty">تعذر تحميل المشاريع.</div>'}
}

async function submitProject(){
 const payload={
  title:pTitle.value.trim(),owner_name:pOwner.value.trim(),major:pMajor.value.trim(),
  study_year:pYear.value.trim(),description:pDescription.value.trim(),github_url:pGithub.value.trim()||null,
  demo_url:pDemo.value.trim()||null,image_url:pImage.value.trim()||null,contact:pContact.value.trim(),
  status:'pending',featured:false
 }
 if(!payload.title||!payload.owner_name||!payload.description||!payload.contact){showToast('أكمل الحقول المطلوبة',true);return}
 try{
  await sb('student_projects',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify(payload)})
  showToast('تم إرسال مشروعك للمراجعة ✅');closeSubmit()
  document.querySelectorAll('#submitModal input,#submitModal textarea').forEach(x=>x.value='')
 }catch(e){showToast(e.message||'فشل الإرسال',true)}
}
loadProjects()
</script>
</body>
</html>
