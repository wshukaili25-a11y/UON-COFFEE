<body>
<header class="site-header">
<div class="container nav">
<a class="brand" href="index.html"><span class="brand-mark">U1</span>UON <span>Hub</span></a>
<a class="btn" href="index.html">الرئيسية</a>
</div>
</header>
<main>
<section class="page-hero"><div class="container">
<span class="badge">شاركنا رأيك</span>
<h1 data-ar="اقترح ميزة" data-en="Suggest a Feature">اقترح ميزة</h1>
<p>لا نطلب تسجيل دخول أو بيانات شخصية. اكتب فكرتك فقط.</p>
</div></section>
<section class="section"><div class="container">
<form id="feedbackForm" class="card form-card form-grid">
<div class="field"><label>نوع الاقتراح</label>
<select name="category" required>
<option value="feature">ميزة جديدة</option>
<option value="improvement">تحسين</option>
<option value="bug">مشكلة</option>
<option value="content">محتوى ناقص</option>
</select></div>
<div class="field"><label>الكلية — اختياري</label><select id="feedbackCollege" name="college"><option value="">اختر الكلية</option></select></div>
<div class="field wide"><label>عنوان الفكرة</label><input name="title" required maxlength="120"></div>
<div class="field wide"><label>التفاصيل</label><textarea name="details" rows="7" required maxlength="2000"></textarea></div>
<div class="field wide"><label>وسيلة تواصل — اختياري</label><input name="contact" type="text" autocomplete="tel" inputmode="text" placeholder="رقم هاتفك أو حسابك على إنستجرام (اختياري)، ويُترك فارغًا إذا تفضل"></div>
<button class="btn primary field wide" type="submit">إرسال الاقتراح</button>
</form>
</div></section>
</main>
<div id="toast" class="toast"></div>
<script defer src="js/feedback.js?v=18.10"></script>
<aside class="notification-drawer" id="notificationDrawer"><div class="section-head"><h3>الإشعارات</h3><button class="icon-btn" id="closeNotifications">✕</button></div><div id="notificationItems" class="notification-list"></div></aside><script type="module">import {setupV14Shell} from "./js/v14-ui.js?v=18.10";setupV14Shell();</script><script type="module">import {applyFeatureStates} from "./js/core.js?v=18.10";applyFeatureStates(document);</script><script type="module" src="js/runtime-guard.js?v=18.10"></script></body>
