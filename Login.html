<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>دخول المشرف</title>
<style>
body{font-family:Tajawal,sans-serif;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#1e293b;padding:30px;border-radius:16px;width:360px}
input,button{width:100%;padding:12px;margin-top:10px}
button{cursor:pointer}
</style></head><body>
<div class="card">
<h2>تسجيل دخول المشرف</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button id="loginBtn">دخول</button>
</div>
<script type="module">
import { signIn } from './supabase.js';
loginBtn.onclick = async ()=>{
 const {error}=await signIn(email.value,password.value);
 if(error) return alert(error.message);
 location.href='admin.html';
}
</script></body></html>
