<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إدارة UON Hub</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/app.css"></head><body><div id="login" class="login-shell"><form class="card login-card" id="loginForm"><h1>دخول الإدارة</h1><label>كلمة المرور</label><input id="password" type="password" required><button class="btn primary" style="width:100%;margin-top:12px">دخول</button><a class="btn" href="index.html" style="width:100%;margin-top:8px">الرئيسية</a></form></div><div id="dashboard" class="admin-layout" hidden><aside class="sidebar" id="sidebar"><h2>UON Hub V7</h2><button class="btn" data-section="overview">نظرة عامة</button><button class="btn" data-section="site">الموقع والصيانة</button><button class="btn" data-section="features">خدمات الموقع</button><button class="btn" data-section="pending">الطلبات المعلقة</button><button class="btn" data-section="announcements">الإعلانات</button><button class="btn" data-section="tools">الأدوات الخارجية</button><button class="btn" data-section="programs">دليل الجامعة</button><button class="btn" data-section="telegram">مشرفو تلجرام</button></aside><main class="admin-main"><div class="admin-top"><h1>لوحة الإدارة</h1><div><button class="btn" id="menuAdmin">☰</button><button class="btn danger" id="logout">خروج</button></div></div>
<section class="admin-section active" id="sec-overview"><div id="stats" class="grid grid-4"></div></section>
<section class="admin-section" id="sec-site"><div class="card form-card"><label><input id="maintenance" type="checkbox" style="width:auto"> تفعيل صيانة الموقع بالكامل</label><label>رسالة الصيانة</label><textarea id="maintenanceMessage"></textarea><label>رابط قناة واتساب</label><input id="whatsappUrl"><button class="btn primary" id="saveSite">حفظ</button></div></section>
<section class="admin-section" id="sec-features"><div id="featuresList" class="list"></div></section>
<section class="admin-section" id="sec-pending"><div class="toolbar"><select id="pendingTable"><option value="summaries">الملخصات</option><option value="whatsapp_groups">المجموعات</option><option value="student_market">السوق</option><option value="rating_submissions">التقييمات</option><option value="confessions">الاعترافات</option></select></div><div id="pendingList" class="list"></div></section>
<section class="admin-section" id="sec-announcements"><div class="card form-card"><input id="adTitle" placeholder="عنوان الإعلان"><textarea id="adBody" placeholder="النص"></textarea><input id="adUrl" placeholder="الرابط اختياري"><button class="btn primary" id="addAd">إضافة إعلان</button></div><div id="adsList" class="list" style="margin-top:18px"></div></section>
<section class="admin-section" id="sec-tools"><div id="toolsList" class="list"></div></section>
<section class="admin-section" id="sec-programs"><div id="programsList" class="list"></div></section>
<section class="admin-section" id="sec-telegram"><div class="card form-card"><div class="form-grid"><input id="tgName" placeholder="اسم المشرف"><input id="tgChat" placeholder="Chat ID"><select id="tgRole"><option value="owner">مالك</option><option value="admin">مشرف</option><option value="moderator">مراجع</option></select></div><button class="btn primary" id="addTg">إضافة</button></div><div id="tgList" class="list" style="margin-top:18px"></div></section>
</main></div><div id="toast" class="toast"></div><script type="module" src="js/admin.js?v=7"></script></body></html>
