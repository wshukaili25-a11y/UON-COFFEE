<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>لوحة الإدارة | UON Hub</title><link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="css/base.css"><link rel="stylesheet" href="css/admin.css"></head><body><div class="login-overlay" id="loginOverlay"><div class="card login-card"><a class="brand" href="index.html"><span class="brand-mark">U1</span>UON <span>Hub</span></a><h2 style="margin-top:1rem">دخول المشرف</h2><input id="adminPassword" type="password" placeholder="كلمة المرور"><button class="primary-btn" style="width:100%" onclick="login()">دخول</button></div></div><div class="admin-shell"><aside class="sidebar" id="sidebar"><a class="brand" href="index.html"><span class="brand-mark">U1</span>UON <span>Hub</span></a><nav class="admin-nav"><button class="active" onclick="showSection('overview',this)"><i class="fas fa-chart-pie"></i>نظرة عامة</button><button onclick="showSection('announcements',this)"><i class="fas fa-bullhorn"></i>الإعلانات</button><button onclick="showSection('summaries',this)"><i class="fas fa-book"></i>الملخصات</button><button onclick="showSection('groups',this)"><i class="fab fa-whatsapp"></i>المجموعات</button><button onclick="showSection('projects',this)"><i class="fas fa-code"></i>المشاريع</button><button onclick="showSection('ratings',this)"><i class="fas fa-star"></i>التقييمات</button></nav></aside><main class="admin-main"><div class="admin-top"><div><h1>لوحة التحكم</h1><p style="color:var(--muted)">UON Hub v4</p></div><button class="icon-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button></div>
<section class="admin-section active" id="section-overview"><div class="grid admin-stats"><div class="card admin-stat"><strong id="statSummaries">0</strong><span>ملخصات معلقة</span></div><div class="card admin-stat"><strong id="statGroups">0</strong><span>مجموعات معلقة</span></div><div class="card admin-stat"><strong id="statProjects">0</strong><span>مشاريع معلقة</span></div><div class="card admin-stat"><strong id="statRatings">0</strong><span>تقييمات معلقة</span></div></div><div class="card admin-card"><h2>مرحبًا في UON Hub v4</h2><p style="color:var(--muted);margin-top:.5rem">لوحة موحدة لمراجعة المحتوى وإدارة الإعلانات.</p></div></section>
<section class="admin-section" id="section-announcements"><div class="card admin-card"><h2>إعلان جديد</h2><div class="form-grid" style="margin-top:1rem"><div class="field"><label>العنوان</label><input id="annTitle"></div><div class="field"><label>النوع</label><select id="annType"><option value="normal">عادي</option><option value="important">مهم</option><option value="urgent">عاجل</option><option value="event">فعالية</option></select></div><div class="field wide"><label>النص</label><textarea id="annBody"></textarea></div><div class="field"><label>الأولوية</label><input id="annPriority" type="number" value="10"></div><div class="field"><label>انتهاء</label><input id="annExpires" type="datetime-local"></div><div class="field"><label>نص الزر</label><input id="annButtonText"></div><div class="field"><label>الرابط</label><input id="annButtonUrl"></div></div><button class="primary-btn" style="margin-top:1rem" onclick="createAnnouncement()">نشر الإعلان</button></div><div class="card admin-card"><div id="list-announcements" class="admin-list"></div></div></section>
<section class="admin-section" id="section-summaries"><div class="card admin-card"><h2>طلبات الملخصات</h2><div id="list-summaries" class="admin-list" style="margin-top:1rem"></div></div></section>
<section class="admin-section" id="section-groups"><div class="card admin-card"><h2>طلبات المجموعات</h2><div id="list-groups" class="admin-list" style="margin-top:1rem"></div></div></section>
<section class="admin-section" id="section-projects"><div class="card admin-card"><h2>طلبات المشاريع</h2><div id="list-projects" class="admin-list" style="margin-top:1rem"></div></div></section>
<section class="admin-section" id="section-ratings"><div class="card admin-card"><h2>طلبات التقييمات</h2><div id="list-ratings" class="admin-list" style="margin-top:1rem"></div></div></section>
