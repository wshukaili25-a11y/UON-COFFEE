<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#0a0e27">
<title>تقييم المواد والدكاترة | UON Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--primary:#00d4ff;--dark:#0a0e27;--card:#1a1f3d;--text:#eef2ff;--muted:#8390ad;--gold:#facc15;--green:#22c55e;--danger:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tajawal,sans-serif;background:var(--dark);color:var(--text)}
.container{width:min(1200px,92%);margin:auto}
header{position:sticky;top:0;z-index:20;background:rgba(10,14,39,.92);backdrop-filter:blur(15px);border-bottom:1px solid rgba(255,255,255,.07)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 0;gap:1rem}
.logo{font-weight:900;font-size:1.22rem}.logo span{color:var(--primary)}
.nav a{color:var(--text);text-decoration:none;border:1px solid rgba(255,255,255,.1);padding:.55rem .8rem;border-radius:10px}
.hero{padding:4rem 0 2rem;text-align:center;background:radial-gradient(circle at 50% 0%,rgba(250,204,21,.08),transparent 34%)}
.hero h1{font-size:clamp(2rem,5vw,3.3rem)}.hero p{max-width:720px;margin:.8rem auto;color:var(--muted);line-height:1.8}
.tabs{display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap;margin:1.4rem 0}
.tab{border:1px solid rgba(255,255,255,.1);background:var(--card);color:var(--muted);padding:.65rem .9rem;border-radius:11px;font-family:Tajawal,sans-serif;font-weight:800;cursor:pointer}
.tab.active{background:rgba(250,204,21,.1);border-color:rgba(250,204,21,.28);color:var(--gold)}
.toolbar{display:flex;gap:.7rem;flex-wrap:wrap;margin:1rem 0}
.toolbar input,.toolbar select{flex:1;min-width:210px;background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:.75rem;color:white;font-family:Tajawal,sans-serif}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:1rem;padding-bottom:4rem}
.rating-card{background:linear-gradient(145deg,rgba(28,35,72,.98),rgba(18,24,50,.98));border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:1rem;display:flex;flex-direction:column;gap:.75rem}
.rating-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.8rem}
.rating-head h3{font-size:1.02rem}.rating-type{font-size:.65rem;padding:.25rem .5rem;border-radius:999px;background:rgba(0,212,255,.08);color:var(--primary)}
.score{display:flex;align-items:center;gap:.55rem}.score strong{font-size:1.8rem;color:var(--gold)}.stars{color:var(--gold);letter-spacing:.08rem}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem}.metric{background:rgba(255,255,255,.025);border-radius:10px;padding:.65rem}.metric span{display:block;font-size:.69rem;color:var(--muted)}.metric b{font-size:.86rem}
.comment{color:var(--muted);line-height:1.7;font-size:.84rem;border-top:1px solid rgba(255,255,255,.06);padding-top:.7rem}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:3rem;border:1px dashed rgba(255,255,255,.1);border-radius:16px}
.add-btn{position:fixed;bottom:22px;left:22px;z-index:30;border:0;border-radius:15px;background:linear-gradient(135deg,var(--gold),#f59e0b);color:#241500;padding:.85rem 1rem;font-family:Tajawal,sans-serif;font-weight:900;box-shadow:0 12px 35px rgba(250,204,21,.22);cursor:pointer}
.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:1rem}.modal.show{display:flex}
.modal-card{width:min(720px,100%);max-height:90vh;overflow:auto;background:var(--card);border-radius:20px;padding:1.2rem;border:1px solid rgba(255,255,255,.1)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}.modal-head button{background:none;border:0;color:white;font-size:1.2rem;cursor:pointer}
.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem}.wide{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:.35rem}.form-group label{font-size:.74rem;color:var(--muted)}
.form-group input,.form-group textarea,.form-group select{background:var(--dark);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.72rem;color:white;font-family:Tajawal,sans-serif}
.submit{width:100%;margin-top:1rem;border:0;border-radius:11px;padding:.8rem;background:var(--gold);color:#241500;font-family:Tajawal,sans-serif;font-weight:900;cursor:pointer}
.notice{font-size:.72rem;color:var(--muted);margin-top:.7rem}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);opacity:0;background:var(--green);padding:.75rem 1rem;border-radius:11px;transition:.25s;z-index:70}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.error{background:var(--danger)}
@media(max-width:650px){.form-grid{grid-template-columns:1fr}.wide{grid-column:auto}.grid{grid-template-columns:1fr}.add-btn{left:12px;right:12px;width:calc(100% - 24px)}}
</style>
</head>
<body>
<header><div class="container nav"><div class="logo">UON <span>Hub</span></div><a href="index.html"><i class="fas fa-arrow-right"></i> الرئيسية</a></div></header>
<main class="container">
<section class="hero">
<h1>تقييم المواد والدكاترة ⭐</h1>
<p>شارك تجربتك بمسؤولية، وساعد الطلاب على معرفة طبيعة المادة وأسلوب التدريس. جميع التقييمات مجهولة وتظهر بعد مراجعة المشرف.</p>
</section>
<div class="tabs"><button class="tab active" data-kind="course" onclick="setKind('course',this)">المواد</button><button class="tab" data-kind="instructor" onclick="setKind('instructor',this)">الدكاترة</button></div>
<div class="toolbar"><input id="search" placeholder="ابحث باسم المادة أو الدكتور..." oninput="render()"><select id="collegeFilter" onchange="render()"><option value="">كل الكليات</option></select></div>
<section id="ratingsGrid" class="grid"><div class="empty">جاري تحميل التقييمات...</div></section>
</main>
<button class="add-btn" onclick="openModal()"><i class="fas fa-plus"></i> أضف تقييمك</button>

<div id="modal" class="modal"><div class="modal-card">
<div class="modal-head"><h2>إرسال تقييم</h2><button onclick="closeModal()"><i class="fas fa-times"></i></button></div>
<div class="form-grid">
<div class="form-group"><label>نوع التقييم</label><select id="rKind" onchange="updateLabels()"><option value="course">مادة</option><option value="instructor">دكتور/محاضر</option></select></div>
<div class="form-group"><label id="nameLabel">اسم أو رمز المادة *</label><input id="rName" maxlength="120"></div>
<div class="form-group"><label>الكلية</label><input id="rCollege" maxlength="120"></div>
<div class="form-group"><label>التقييم العام من 5 *</label><select id="rOverall"><option value="5">5 ممتاز</option><option value="4">4 جيد جدًا</option><option value="3">3 جيد</option><option value="2">2 ضعيف</option><option value="1">1 سيئ</option></select></div>
<div class="form-group course-only"><label>سهولة المادة</label><select id="rDifficulty"><option value="5">سهلة جدًا</option><option value="4">سهلة</option><option value="3">متوسطة</option><option value="2">صعبة</option><option value="1">صعبة جدًا</option></select></div>
<div class="form-group instructor-only" style="display:none"><label>وضوح الشرح</label><select id="rClarity"><option value="5">ممتاز</option><option value="4">جيد جدًا</option><option value="3">جيد</option><option value="2">ضعيف</option><option value="1">ضعيف جدًا</option></select></div>
<div class="form-group"><label>صعوبة الاختبارات</label><select id="rExams"><option value="5">سهلة جدًا</option><option value="4">سهلة</option><option value="3">متوسطة</option><option value="2">صعبة</option><option value="1">صعبة جدًا</option></select></div>
<div class="form-group"><label>الواجبات والمتطلبات</label><select id="rWorkload"><option value="5">خفيفة جدًا</option><option value="4">خفيفة</option><option value="3">متوسطة</option><option value="2">كثيرة</option><option value="1">كثيرة جدًا</option></select></div>
<div class="form-group wide"><label>تعليق أو نصيحة للطلاب *</label><textarea id="rComment" rows="4" maxlength="500"></textarea></div>
</div>
<p class="notice">لا تكتب معلومات شخصية أو إساءة. التقييم سيظهر بعد موافقة المشرف.</p>
<button class="submit" onclick="submitRating()">إرسال للمراجعة</button>
</div></div>
<div id="toast" class="toast"></div>
<script>
const SB_URL='https://irkhvydgxpseflggbeqq.supabase.co'
const SB_KEY='sb_publishable_gZ9tyM1udrkuQIXHqDtToQ_FyFmePgH'
const headers={apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'Content-Type':'application/json'}
let rows=[],currentKind='course'
async function api(path,opts={}){const r=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:{...headers,...(opts.headers||{})}});const text=await r.text();const data=text?JSON.parse(text):null;if(!r.ok)throw new Error(data?.message||'Request failed');return data}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
function showToast(msg,error=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(error?' error':'');setTimeout(()=>t.className='toast',2600)}
function stars(n){n=Math.round(Number(n||0));return '★'.repeat(n)+'☆'.repeat(5-n)}
function setKind(k,btn){currentKind=k;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));btn.classList.add('active');render()}
function render(){
 const q=search.value.trim().toLowerCase(),college=collegeFilter.value
 const list=rows.filter(r=>r.kind===currentKind && (!q||`${r.target_name} ${r.college||''}`.toLowerCase().includes(q)) && (!college||r.college===college))
 const grid=document.getElementById('ratingsGrid')
 if(!list.length){grid.innerHTML='<div class="empty">لا توجد تقييمات معتمدة بعد.</div>';return}
 grid.innerHTML=list.map(r=>`
 <article class="rating-card">
  <div class="rating-head"><div><h3>${esc(r.target_name)}</h3><small style="color:var(--muted)">${esc(r.college||'')}</small></div><span class="rating-type">${r.kind==='course'?'مادة':'دكتور'}</span></div>
  <div class="score"><strong>${Number(r.overall_rating).toFixed(1)}</strong><span class="stars">${stars(r.overall_rating)}</span></div>
  <div class="metrics">
   ${r.kind==='course'?`<div class="metric"><span>سهولة المادة</span><b>${Number(r.difficulty_rating||0).toFixed(1)}/5</b></div>`:`<div class="metric"><span>وضوح الشرح</span><b>${Number(r.clarity_rating||0).toFixed(1)}/5</b></div>`}
   <div class="metric"><span>الاختبارات</span><b>${Number(r.exams_rating||0).toFixed(1)}/5</b></div>
   <div class="metric"><span>المتطلبات</span><b>${Number(r.workload_rating||0).toFixed(1)}/5</b></div>
   <div class="metric"><span>عدد التقييمات</span><b>${Number(r.reviews_count||1)}</b></div>
  </div>
  ${r.latest_comment?`<p class="comment">“${esc(r.latest_comment)}”</p>`:''}
 </article>`).join('')
}
function openModal(){modal.classList.add('show')}function closeModal(){modal.classList.remove('show')}
function updateLabels(){const instructor=rKind.value==='instructor';nameLabel.textContent=instructor?'اسم الدكتور/المحاضر *':'اسم أو رمز المادة *';document.querySelectorAll('.course-only').forEach(x=>x.style.display=instructor?'none':'flex');document.querySelectorAll('.instructor-only').forEach(x=>x.style.display=instructor?'flex':'none')}
async function submitRating(){
 const payload={kind:rKind.value,target_name:rName.value.trim(),college:rCollege.value.trim()||null,overall_rating:Number(rOverall.value),difficulty_rating:rKind.value==='course'?Number(rDifficulty.value):null,clarity_rating:rKind.value==='instructor'?Number(rClarity.value):null,exams_rating:Number(rExams.value),workload_rating:Number(rWorkload.value),comment:rComment.value.trim(),status:'pending'}
 if(!payload.target_name||!payload.comment){showToast('أكمل الحقول المطلوبة',true);return}
 try{await api('rating_submissions',{method:'POST',headers:{Prefer:'return=representation'},body:JSON.stringify(payload)});showToast('تم إرسال التقييم للمراجعة ✅');closeModal();document.querySelectorAll('#modal input,#modal textarea').forEach(x=>x.value='')}catch(e){showToast(e.message||'فشل الإرسال',true)}
}
async function load(){
 try{rows=await api('rating_public_summary?select=*&order=overall_rating.desc');const colleges=[...new Set(rows.map(r=>r.college).filter(Boolean))];colleges.forEach(c=>collegeFilter.insertAdjacentHTML('beforeend',`<option>${esc(c)}</option>`));render()}catch(e){ratingsGrid.innerHTML='<div class="empty">تعذر تحميل التقييمات.</div>'}
}
load()
</script>
</body></html>
