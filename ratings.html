<!doctype html><html lang="ar" dir="rtl"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>تقييمات الدكاترة والمقررات | UON Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css?v=17.5">
</head><body>
<header class="site-header"><div class="container nav"><a class="brand" href="index.html"><span class="brand-mark">U1</span>UON <span>Hub</span></a><a class="btn" href="index.html">الرئيسية</a></div></header>
<main class="v14-page-main"><section class="page-hero"><div class="container"><span class="badge">تجارب الطلاب</span><h1>تقييمات الدكاترة والمقررات</h1><p>التقييمات مجهولة ولا نطلب حسابًا.</p></div></section>
<section class="section"><div class="container">
<div class="toolbar"><input id="ratingSearch" placeholder="ابحث عن دكتور أو مقرر"><button id="openRating" class="btn primary">إضافة تقييم</button></div>
<div id="ratingCards" class="grid grid-3"></div>
</div></section></main>
<div class="modal" id="ratingModal"><div class="card modal-card"><div class="section-head"><h2>إضافة تقييم</h2><button id="closeRating" class="icon-btn">✕</button></div>
<form id="ratingForm" class="form-grid">
<div class="field"><label>النوع</label><select name="target_type"><option value="instructor">دكتور</option><option value="course">مقرر</option></select></div>
<div class="field"><label>الاسم</label><input name="target_name" required></div>
<div class="field"><label>المقرر — اختياري</label><input name="course_code"></div>
<div class="field"><label>التقييم العام من 5</label><input name="overall" type="number" min="1" max="5" required></div>
<div class="field"><label>الشرح</label><input name="teaching" type="number" min="1" max="5"></div>
<div class="field"><label>التعامل</label><input name="interaction" type="number" min="1" max="5"></div>
<div class="field"><label>صعوبة الاختبارات</label><input name="exam_difficulty" type="number" min="1" max="5"></div>
<div class="field"><label>هل تنصح به؟</label><select name="recommended"><option value="true">نعم</option><option value="false">لا</option></select></div>
<div class="field wide"><label>تعليق</label><textarea name="comment" rows="5" maxlength="1000"></textarea></div>
<button class="btn primary field wide">إرسال للمراجعة</button>
</form></div></div>
<div id="toast" class="toast"></div>
<script type="module" src="js/ratings.js?v=17.5"></script>
<aside class="notification-drawer" id="notificationDrawer"><div class="section-head"><h3>الإشعارات</h3><button class="icon-btn" id="closeNotifications">✕</button></div><div id="notificationItems" class="notification-list"></div></aside><script type="module">import {setupV14Shell} from "./js/v14-ui.js?v=17.5";setupV14Shell();</script></body></html>
